<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dyson</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="wrapper">
        <header class="header">
            <div class="header__button-menu">
                <img src="img/menu.svg" alt="Меню">
            </div>
                <img src="img/logo.png" alt="Dyson" class="header__logo">
            <div class="header__buttons">
                <div class="header__button-favourite">
                    <img src="img/favourite.svg" alt="Избранное">
                </div>
                <div class="header__button-cart">
                    <img src="img/cart.svg" alt="Корзина">
                </div>
            </div>
        </header>
        <section class="main">
            
            <div class="main__text">
                <h2>Уникальные технологии для ухода за волосами</h2><br>
                <p>Идеальная укладка для всех типов волос вместе с Dyson</p>
            <button name="details" class="main__button">Подробнее</button>
            </div>
            
            <img src="img/main.png" class="main__image">
        </section>

        <section class="product">
            <div class="product__card">
            <img src="img/sale.png" class="product__image">
            Акции
            </div>
            <div class="product__card">
            <img src="img/fen.png" class="product__image">
            Фены
            </div>
            <div class="product__card">
            <img src="img/styler.png" class="product__image">
            Стайлеры
            </div>
            <div class="product__card">
            <img src="img/straightener.png" class="product__image">
            Выпрямители
            </div>
            <div class="product__card">
            <img src="img/sale.png" class="product__image">
            Акции
            </div>
            <div class="product__card">
            <img src="img/fen.png" class="product__image">
            Фены
            </div>
            <div class="product__card">
            <img src="img/styler.png" class="product__image">
            Стайлеры
            </div>
            <div class="product__card">
            <img src="img/straightener.png" class="product__image">
            Выпрямители
            </div>
        </section>
        </section>
    </div>
</body>
